version: 2

models:
  - name: int_orders_with_items
    description: >
      One row per order line item. Joins stg_orders with stg_products to enrich
      each transaction with product description. Excludes fees and adjustments
      via INNER JOIN with stg_products. Includes cancellations and returns to
      allow net revenue calculation downstream.
    config:
      meta:
        owner: analytics
        domain: sales
    columns:
      - name: invoice_id
        description: "Invoice number. Inherited from stg_orders."
        tests:
          - not_null
      - name: stock_code
        description: "Product stock code. Inherited from stg_orders."
        tests:
          - not_null
      - name: customer_id
        description: "Customer identifier. Nullable — guest transactions have no customer_id."
      - name: country
        description: "Country of the customer at time of transaction. Reflects transaction-level country, not the customer's current country."
      - name: product_description
        description: "Product name from stg_products catalog — canonical, deduplicated description."
      - name: quantity
        description: "Quantity per line item. Negative for returns and cancellations."
      - name: unit_price
        description: "Unit price in GBP per transaction line. Can be zero or negative for corrections."
      - name: line_revenue
        description: "quantity * unit_price. Negative for cancellations and returns."
      - name: invoice_at
        description: "Invoice timestamp."
        tests:
          - not_null
      - name: is_cancelled
        description: "TRUE if the invoice was a cancellation (invoice_id prefix 'C')."

  - name: int_customer_order_history
    description: >
      One row per customer with aggregated purchase history metrics.
      Built from int_orders_with_items. Excludes customers with only cancelled orders
      via HAVING clause. Separates gross and net revenue for flexible downstream use.
    config:
      meta:
        owner: analytics
        domain: customers
    columns:
      - name: customer_id
        description: "Customer identifier. Primary key of this model."
        tests:
          - unique
          - not_null
      - name: first_order_at
        description: "Timestamp of the customer's first non-cancelled order."
        tests:
          - not_null
      - name: last_order_at
        description: "Timestamp of the customer's most recent non-cancelled order."
        tests:
          - not_null
      - name: total_orders
        description: "Total number of distinct non-cancelled invoices."
      - name: total_line_items
        description: "Total number of line items across all non-cancelled invoices."
      - name: total_unique_products
        description: "Number of distinct SKUs purchased across all non-cancelled orders."
      - name: total_revenue_gross
        description: "Sum of line_revenue for non-cancelled lines only."
      - name: total_revenue_net
        description: "Sum of all line_revenue including cancellations. Gross minus cancelled amounts."
      - name: total_revenue_cancelled
        description: "Sum of line_revenue for cancelled lines only. Always zero or negative."
      - name: avg_order_value
        description: "total_revenue_gross / total_orders. Uses NULLIF to avoid division by zero."
      - name: customer_lifespan_days
        description: "Days between first and last non-cancelled order. Zero for one-time customers."
      - name: is_repeat_customer
        description: "TRUE if the customer has more than one distinct non-cancelled invoice."

  - name: int_products_enriched
    description: >
      One row per product SKU from stg_products, enriched with sales history metrics
      from stg_orders. Only counts non-cancelled sales with positive quantity.
      is_active is anchored to the dataset max date (not CURRENT_DATE) since the
      source data is static (ends 2011-12-09).
    config:
      meta:
        owner: analytics
        domain: products
    columns:
      - name: stock_code
        description: "Product stock code. Primary key of this model."
        tests:
          - unique
          - not_null
      - name: product_description
        description: "Most recent product name from stg_products."
      - name: unit_price
        description: "Most recent unit price in GBP from stg_products."
      - name: stock_code_type
        description: "Classification from stg_orders. Limited to 'product' and 'other' in this model."
      - name: first_sold_at
        description: "Timestamp of the earliest sale for this SKU."
      - name: last_sold_at
        description: "Timestamp of the most recent sale. NULL if never sold."
      - name: total_units_sold
        description: "Total units sold across non-cancelled, positive-quantity lines."
      - name: total_revenue
        description: "Total gross revenue (quantity * unit_price) for this SKU."
      - name: total_orders
        description: "Number of distinct invoices that included this SKU."
      - name: avg_quantity_per_order
        description: "Average units per order. Uses SAFE_DIVIDE — NULL if never sold."
      - name: days_since_last_sale
        description: "Days between last_sold_at and dataset max date. NULL if never sold."
      - name: is_active
        description: "TRUE if last sale was within 90 days of dataset max date. FALSE if inactive or never sold."
