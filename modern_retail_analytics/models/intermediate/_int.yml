version: 2

models:
  - name: int_orders_with_items
    description: "One row per order line item. Joins stg_orders with stg_products to enrich each transaction with product description. Excludes fees and adjustments via INNER JOIN. Includes cancellations to allow net revenue calculation downstream."
    columns:
      - name: invoice_id
        description: "Invoice number. Inherited from stg_orders."
        tests:
          - not_null
      - name: stock_code
        description: "Product stock code. Inherited from stg_orders."
        tests:
          - not_null
      - name: customer_id
        description: "Customer identifier. Nullable — guest transactions have no customer_id."
      - name: country
        description: "Country of the customer at time of transaction. Inherited from stg_orders — reflects transaction-level country, not the customer's current country."
      - name: product_description
        description: "Product name. Inherited from stg_products catalog."
      - name: quantity
        description: "Quantity per line item. Negative values indicate cancellations and are preserved for net revenue calculation."
      - name: unit_price
        description: "Unit price in GBP per transaction line. Inherited from stg_orders — can be zero or negative for corrections even if the product has a positive price in the catalog."
      - name: line_revenue
        description: "Revenue for this line item. Calculated as quantity * unit_price. Negative for cancellations."
      - name: invoice_at
        description: "Invoice timestamp."
        tests:
          - not_null
      - name: is_cancelled
        description: "True if the invoice was a cancellation."

  - name: int_customer_order_history
    description: "One row per customer with aggregated purchase history. Built from int_orders_with_items. Includes both gross and net revenue metrics to support different analytical use cases."
    columns:
      - name: customer_id
        description: "Customer identifier. Primary key of this model."
        tests:
          - unique
          - not_null
      - name: first_order_at
        description: "Timestamp of the customer's first non-cancelled order."
        tests:
          - not_null
      - name: last_order_at
        description: "Timestamp of the customer's most recent non-cancelled order."
        tests:
          - not_null
      - name: total_orders
        description: "Total number of distinct non-cancelled invoices."
      - name: total_line_items
        description: "Total number of order line items across all non-cancelled invoices."
      - name: total_unique_products
        description: "Number of distinct products purchased across all non-cancelled orders."
      - name: total_revenue_gross
        description: "Total revenue from non-cancelled lines only."
      - name: total_revenue_net
        description: "Total revenue including cancellations. Equals gross minus the absolute value of cancelled amounts."
      - name: total_revenue_cancelled
        description: "Total value of cancelled order lines. Always zero or negative."
      - name: avg_order_value
        description: "Average gross revenue per non-cancelled invoice. Calculated as total_revenue_gross divided by total_orders."
      - name: customer_lifespan_days
        description: "Days between first and last non-cancelled order. Zero for one-time customers."
      - name: is_repeat_customer
        description: "True if the customer has more than one distinct non-cancelled invoice."
